<!DOCTYPE html>
<html lang="en" class="scroll-smooth loading">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rachel Sargent — Writer & Editor</title>
  <meta name="description" content="Rachel Sargent is a writer and editor based in New York City, working at Ecco / HarperCollins. Editorial work, fiction, and awards." />

  <!-- Open Graph -->
  <meta property="og:title" content="Rachel Sargent — Writer & Editor" />
  <meta property="og:description" content="A writer and editor based in New York City. Editorial work, fiction, and awards." />
  <meta property="og:type" content="website" />
  <meta property="og:image" content="images/portrait.jpg" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,300..600;1,9..144,300..500&family=Newsreader:ital,opsz,wght@0,6..72,300..500;1,6..72,300..400&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            paper: "#E9EEF3",
            paper2: "#DFE7EE",
            ink: "#1B2530",
            muted: "#5C6A78",
            accent: "#3C5A78",
            line: "#CDD8E1"
          },
          fontFamily: {
            display: ['Fraunces', 'Georgia', 'serif'],
            body: ['Newsreader', 'Georgia', 'serif']
          }
        }
      }
    };
  </script>
  <!-- Start fetching content early -->
  <link rel="preload" href="content.json" as="fetch" />
  <!-- Hide the page until JS has rendered content.json, so it appears complete
       in one paint instead of empty content "popping in" afterwards. -->
  <style>
    html { background: #E9EEF3; }
    html.loading body { opacity: 0; }
  </style>
  <noscript><style>html.loading body { opacity: 1 !important; }</style></noscript>

  <link rel="stylesheet" href="css/styles.css" />
</head>

<body class="bg-paper text-ink font-body antialiased selection:bg-accent selection:text-paper">
  <div class="grain" aria-hidden="true"></div>

  <!-- Header (non-sticky) -->
  <header class="border-b border-line">
    <div class="mx-auto max-w-4xl px-8 md:px-10 py-5 md:py-6">
      <h1 class="font-display font-normal text-center uppercase tracking-[0.35em] text-sm md:text-base leading-none" data-field="name">Rachel Sargent</h1>
    </div>
  </header>

  <main id="top">
    <!-- Hero / Intro -->
    <section class="mx-auto max-w-2xl px-8 md:px-10 pt-10 md:pt-12 pb-16 md:pb-24 text-center">
      <div class="portrait mx-auto w-24 sm:w-28 aspect-square rounded-full overflow-hidden border border-line bg-paper2">
        <img src="images/portrait.jpg" alt="Portrait of Rachel Sargent" class="h-full w-full object-cover" />
      </div>
      <div id="intro" class="mt-10 md:mt-12 space-y-4 text-justify hyphens-auto font-body text-base md:text-lg leading-relaxed text-ink/90"></div>
      <p class="mt-4 text-left font-body text-base md:text-lg leading-relaxed text-ink/90">
        <a id="contact-email" href="#" class="writing-link"></a>
      </p>
    </section>

    <hr class="mx-auto max-w-4xl border-line" />

    <!-- Editorial Work -->
    <section id="editorial" class="mx-auto max-w-4xl px-8 md:px-10 py-16 md:py-24 scroll-mt-20">
      <div class="flex items-baseline justify-between gap-6 mb-10 md:mb-14">
        <h2 class="section-title">Editorial Work</h2>
        <span class="text-muted text-sm tracking-wide">Ecco · HarperCollins</span>
      </div>

      <h3 class="sub-title mb-8">Books I've Edited</h3>
      <ul id="books-edited" class="grid grid-cols-2 sm:grid-cols-3 gap-x-6 gap-y-12 md:gap-x-10 md:gap-y-16"></ul>

      <h3 class="sub-title mt-16 md:mt-20 mb-8">Books I've Co-Edited</h3>
      <ul id="books-coedited" class="grid grid-cols-2 sm:grid-cols-3 gap-x-6 gap-y-12 md:gap-x-10 md:gap-y-16"></ul>
    </section>

    <hr class="mx-auto max-w-4xl border-line" />

    <!-- Writing -->
    <section id="writing" class="mx-auto max-w-4xl px-8 md:px-10 py-16 md:py-24 scroll-mt-20">
      <div class="flex items-baseline justify-between gap-6 mb-10 md:mb-14">
        <h2 class="section-title">Fiction</h2>
        <span class="text-muted text-sm tracking-wide">Selected stories</span>
      </div>
      <ul id="writing-list" class="border-t border-line"></ul>
    </section>

    <hr class="mx-auto max-w-4xl border-line" />

    <!-- Awards -->
    <section id="awards" class="mx-auto max-w-4xl px-8 md:px-10 py-16 md:py-24 scroll-mt-20">
      <div class="flex items-baseline justify-between gap-6 mb-10 md:mb-14">
        <h2 class="section-title">Awards &amp; Honors</h2>
      </div>
      <ul id="awards-list" class="border-t border-line"></ul>
    </section>
  </main>

  <!-- Footer -->
  <footer class="border-t border-line">
    <div class="mx-auto max-w-4xl px-8 md:px-10 py-12 text-center">
      <ul id="social-list" class="flex justify-center gap-6 text-sm tracking-wide empty:hidden mb-6"></ul>
      <p class="text-xs text-muted tracking-wide">© <span id="year"></span> Rachel Sargent. All rights reserved.</p>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
